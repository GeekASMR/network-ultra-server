name: ✨ Feature Request
description: 新功能 / 改进建议
title: "[Feature] "
labels: ["enhancement", "needs-triage"]
body:
  - type: textarea
    id: problem
    attributes:
      label: 你想解决什么问题?
      description: 用一两句话描述使用场景 + 现在为什么不够好。
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: 你期望的方案
      description: 不需要给出实现细节,描述用户视角的体验即可。
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: 已经考虑过的替代方案
      description: 现在你怎么 work around / 为什么那些方案不够好。
  - type: dropdown
    id: scope
    attributes:
      label: 涉及范围
      multiple: true
      options:
        - "服务端"
        - "客户端 VST3"
        - "Bridge 中继"
        - "安装器"
        - "文档"
    validations:
      required: true
