name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - target: linux-amd64
            goos: linux
            goarch: amd64
          - target: linux-arm64
            goos: linux
            goarch: arm64
          - target: windows-amd64
            goos: windows
            goarch: amd64
            ext: ".exe"
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache: true

      - name: Build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: 0
        run: |
          mkdir -p dist
          go mod tidy
          go build -trimpath -ldflags="-s -w" \
            -o dist/network-ultra-server-${{ matrix.target }}${{ matrix.ext }} \
            ./cmd/server
          ( cd dist && sha256sum network-ultra-server-${{ matrix.target }}${{ matrix.ext }} \
            > network-ultra-server-${{ matrix.target }}${{ matrix.ext }}.sha256 )

      - uses: actions/upload-artifact@v4
        with:
          name: bin-${{ matrix.target }}
          path: dist/*

  publish:
    name: Publish release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Stage install.sh + install.ps1
        run: |
          cp scripts/install.sh dist/install.sh
          cp scripts/install.ps1 dist/install.ps1 2>/dev/null || true

      - uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
